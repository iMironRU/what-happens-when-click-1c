name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - 'chapters/**'
      - 'metadata.yaml'
      - 'assets/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate build info
        id: build
        run: |
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          BUILD_DATE_ISO=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          GIT_REV=$(git rev-parse --short HEAD)
          VERSION="rev. ${GIT_REV}, сборка ${BUILD_DATE}"
          echo "date_iso=${BUILD_DATE_ISO}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}"         >> $GITHUB_OUTPUT
          cat > build-info.yaml <<YAML
          date: '${BUILD_DATE_ISO}'
          version: '${VERSION}'
          YAML

      - name: Assemble book.md
        run: |
          python3 - <<'EOF'
          import glob
          files = sorted(glob.glob("chapters/**/*.md", recursive=True))
          with open("book.md", "w", encoding="utf-8") as out:
              for f in files:
                  with open(f, encoding="utf-8") as inp:
                      out.write(inp.read())
                  out.write("\n\n")
          print(f"Assembled {len(files)} files")
          EOF

      - name: Build EPUB
        uses: docker://pandoc/core:3.1
        with:
          args: >-
            book.md
            --metadata-file=metadata.yaml
            --metadata-file=build-info.yaml
            --toc --toc-depth=2
            --output=book.epub

      - name: Build FB2
        uses: docker://pandoc/core:3.1
        with:
          args: >-
            book.md
            --metadata-file=metadata.yaml
            --metadata-file=build-info.yaml
            --output=book.fb2
            -t fb2

      - name: Build HTML
        uses: docker://pandoc/core:3.1
        with:
          args: >-
            book.md
            --metadata-file=metadata.yaml
            --metadata-file=build-info.yaml
            --toc --toc-depth=2
            --standalone
            --output=book.html

      - name: Build DOCX
        uses: docker://pandoc/core:3.1
        with:
          args: >-
            book.md
            --metadata-file=metadata.yaml
            --metadata-file=build-info.yaml
            --toc --toc-depth=2
            --output=book.docx

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Черновик (${{ steps.build.outputs.version }})"
          tag_name: draft-${{ github.run_id }}
          draft: true
          body: |
            **Версия:** ${{ steps.build.outputs.version }}
            **Коммит:** ${{ github.sha }}
          files: |
            book.epub
            book.fb2
            book.html
            book.docx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
